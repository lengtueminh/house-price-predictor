name: MLOps Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

env:
  # Ép dùng Node 24 để bảo mật và đúng chuẩn GitHub mới
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Đảm bảo Python tìm thấy code trong thư mục src
  PYTHONPATH: ${{ github.workspace }}

jobs:
  data-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data processing
        run: python src/data/run_processing.py

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/

  model-training:
    needs: data-processing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug Environment
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing root directory:"
          ls -F
          echo "Listing data/processed:"
          ls -F data/processed/ || echo "Directory data/processed not found"
          echo "Listing configs:"
          ls -F configs/ || echo "Directory configs not found"

      - name: Create trained model directory
        run: mkdir -p models/trained/

      - name: Train model
        # Chạy từ gốc thư mục để các đường dẫn data/ và configs/ chính xác
        run: python3 src/models/train_model.py

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/trained/

  build-and-publish:
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/trained/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi:latest