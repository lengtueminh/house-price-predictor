name: MLOps Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

env:
  # Ép dùng Node 24 để bảo mật và đúng chuẩn GitHub mới
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Đảm bảo Python tìm thấy code trong thư mục src
  PYTHONPATH: ${{ github.workspace }}

jobs:
  data-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data processing
        run: python src/data/run_processing.py

      - name: Upload processed data
        uses: actions/upload-artifact@v5
        with:
          name: processed-data
          path: data/processed/

  model-training:
    needs: data-processing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug Environment
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing root directory:"
          ls -F
          echo "Listing data/processed:"
          ls -F data/processed/ || echo "Directory data/processed not found"
          echo "Listing configs:"
          ls -F configs/ || echo "Directory configs not found"

      - name: Create trained model directory
        run: mkdir -p models/trained/

      - name: Run data processing
        run: python src/data/run_processing.py

      - name: Run feature engineering
        run: |
          python src/features/engineer.py \
            --input data/processed/cleaned_house_data.csv \
            --output data/processed/featured_house_data.csv \
            --preprocessor models/trained/preprocessor.pkl

      - name: Train model
        # Script train_model.py yêu cầu tham số bắt buộc; thiếu sẽ exit code 2.
        run: |
          python src/models/train_model.py \
            --config configs/model_config.yaml \
            --data data/processed/featured_house_data.csv \
            --models-dir models

      - name: Upload trained model
        uses: actions/upload-artifact@v5
        with:
          name: trained-model
          path: models/trained/

  build-and-publish:
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download trained model
        uses: actions/download-artifact@v5
        with:
          name: trained-model
          path: models/trained/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi:latest